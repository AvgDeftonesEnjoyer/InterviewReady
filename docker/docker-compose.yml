version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-interview} -d ${POSTGRES_DB:-interview_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Redis port NOT exposed to host — accessible only within Docker network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - DEBUG=0
      - DATABASE_URL=postgres://${POSTGRES_USER:-interview}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-interview_db}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: celery -A config worker -l INFO
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    environment:
      - DEBUG=0
      - DATABASE_URL=postgres://${POSTGRES_USER:-interview}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-interview_db}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: celery -A config beat -l INFO
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    environment:
      - DEBUG=0
      - DATABASE_URL=postgres://${POSTGRES_USER:-interview}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-interview_db}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    command: npx expo start --web --reset-cache
    tty: true
    ports:
      - "8081:8081"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - PORT=8081
    depends_on:
      - backend

volumes:
  pgdata:
