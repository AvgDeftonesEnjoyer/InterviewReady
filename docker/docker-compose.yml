version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: interview_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://interview:password123@db:5432/interview_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: celery -A config worker -l INFO
    volumes:
      - ../backend:/app
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://interview:password123@db:5432/interview_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - backend
      - redis

  celery_beat:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: celery -A config beat -l INFO
    volumes:
      - ../backend:/app
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://interview:password123@db:5432/interview_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    command: npm run web
    tty: true
    ports:
      - "8081:8081"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - PORT=8081
    depends_on:
      - backend

volumes:
  pgdata:
